<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Two phones sharing VillageServer resources</title>
  <desc id="desc">An iPhone and Android phone connected by wireless app signals and a USB cable path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b271e"/>
      <stop offset=".58" stop-color="#123e31"/>
      <stop offset="1" stop-color="#0d2f43"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbdf"/>
      <stop offset="1" stop-color="#b9c8c2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#02110d" flood-opacity=".34"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="64" fill="url(#bg)"/>
  <circle cx="600" cy="370" r="290" fill="#d9df7b" opacity=".08"/>
  <circle cx="600" cy="370" r="210" fill="none" stroke="#d9df7b" stroke-width="2" stroke-dasharray="14 18" opacity=".3"/>
  <circle cx="600" cy="370" r="300" fill="none" stroke="#d9df7b" stroke-width="2" stroke-dasharray="20 24" opacity=".22"/>

  <g transform="translate(190 125) rotate(-8)" filter="url(#shadow)">
    <rect width="255" height="465" rx="42" fill="#071b15"/>
    <rect x="18" y="18" width="219" height="429" rx="28" fill="url(#phone)"/>
    <rect x="93" y="34" width="70" height="9" rx="5" fill="#071b15" opacity=".8"/>
    <circle cx="127" cy="412" r="16" fill="#071b15" opacity=".78"/>
    <text x="127" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#123e31">iPhone</text>
    <rect x="53" y="174" width="150" height="78" rx="20" fill="#123e31"/>
    <text x="128" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#d9df7b">FILES</text>
    <text x="128" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">AirDrop / App</text>
  </g>

  <g transform="translate(756 108) rotate(8)" filter="url(#shadow)">
    <rect width="255" height="492" rx="38" fill="#071b15"/>
    <rect x="18" y="20" width="219" height="452" rx="24" fill="url(#phone)"/>
    <circle cx="128" cy="40" r="8" fill="#071b15" opacity=".75"/>
    <rect x="78" y="430" width="100" height="9" rx="5" fill="#071b15" opacity=".7"/>
    <text x="128" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#123e31">Android</text>
    <rect x="50" y="184" width="156" height="86" rx="22" fill="#123e31"/>
    <text x="128" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#d9df7b">FILES</text>
    <text x="128" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">Quick Share</text>
  </g>

  <path d="M453 304 C520 235 680 235 747 304" fill="none" stroke="#d9df7b" stroke-width="12" stroke-linecap="round" opacity=".85" filter="url(#glow)"/>
  <path d="M463 382 C535 460 665 460 737 382" fill="none" stroke="#f4f7b1" stroke-width="8" stroke-linecap="round" opacity=".8"/>
  <path d="M442 497 C520 612 684 612 762 497" fill="none" stroke="#b9c8c2" stroke-width="10" stroke-linecap="round" stroke-dasharray="18 18" opacity=".75"/>

  <g transform="translate(481 284)">
    <rect width="238" height="92" rx="46" fill="#d9df7b"/>
    <circle cx="53" cy="46" r="23" fill="#123e31"/>
    <path d="M44 46h18M53 37v18" stroke="#d9df7b" stroke-width="6" stroke-linecap="round"/>
    <text x="143" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#123e31">APP TRANSFER</text>
    <text x="143" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#123e31">LocalSend · AirDrop · Quick Share</text>
  </g>

  <g transform="translate(432 520)">
    <rect width="336" height="78" rx="22" fill="#071b15" opacity=".78"/>
    <path d="M42 39h252" stroke="#d9df7b" stroke-width="9" stroke-linecap="round"/>
    <rect x="24" y="25" width="34" height="28" rx="7" fill="#d7dde2"/>
    <rect x="278" y="25" width="34" height="28" rx="7" fill="#d7dde2"/>
    <text x="168" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#fff">USB / microSD fallback</text>
  </g>

  <g font-family="Arial, sans-serif" font-weight="800" font-size="20">
    <text x="158" y="664" fill="#d9df7b">iPhone → iPhone</text>
    <text x="420" y="686" fill="#f8fbdf">iPhone ↔ Android</text>
    <text x="780" y="664" fill="#d9df7b">Android → Android</text>
  </g>
</svg>
